server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # --- Markdown negotiation (C1) ---
    # If a client sends Accept: text/markdown on the homepage, serve the
    # long-form llms-full.txt as text/markdown.
    location = / {
        if ($http_accept ~* "text/markdown") {
            rewrite ^ /llms-full.txt last;
        }
        # Advertise the markdown alternate (D3 Link header, RFC 8288).
        add_header Link '</llms.txt>; rel="alternate"; type="text/markdown", </.well-known/api-catalog>; rel="api-catalog"' always;
        try_files /index.html =404;
    }

    # --- llms.txt / llms-full.txt served as text/markdown ---
    location = /llms.txt {
        default_type text/markdown;
        charset utf-8;
    }

    location = /llms-full.txt {
        default_type text/markdown;
        charset utf-8;
    }

    # --- .well-known content-type overrides ---
    # API Catalog (RFC 9727): application/linkset+json
    location = /.well-known/api-catalog {
        default_type application/linkset+json;
        charset utf-8;
    }

    # Generic .well-known/*.json: application/json
    location ~ ^/\.well-known/.+\.json$ {
        default_type application/json;
        charset utf-8;
    }

    # .well-known default (YAML manifests, directories): JSON-ish default so
    # clients don't get html soft-404s.
    location /.well-known/ {
        default_type application/json;
    }

    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/plain text/markdown text/css application/json application/linkset+json application/javascript text/xml application/xml text/javascript image/svg+xml;
}
